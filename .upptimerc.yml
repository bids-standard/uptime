# Change these first
owner: bids-standard # Your GitHub organization or username, where this repository lives
repo: uptime # The name of this repository

sites:
  # Main websites
  - name: Specification
    url: https://bids-specification.readthedocs.io/
  - name: Website
    url: https://bids.neuroimaging.io/
  - name: Validator
    url: https://bids-standard.github.io/bids-validator/
  # Validator
  - name: Validator Documentation
    url: https://bids-validator.readthedocs.io/
  - name: Validator (development)
    url: https://bids-standard.github.io/bids-validator/dev/
  - name: Validator (legacy)
    url: https://bids-standard.github.io/legacy-validator/
  # Stats models
  - name: BIDS Stats Models
    url: https://bids-standard.github.io/stats-models/
  - name: BIDS Stats Models Zoo
    url: https://bids-standard.github.io/model-zoo/
  # Other tools
  - name: Awesome BIDS
    url: https://bids-standard.github.io/awesome-bids/
  - name: BIDS schema tools documentation
    url: https://bidsschematools.readthedocs.io/
  - name: PyBIDS Documentation
    url: https://bids-standard.github.io/pybids/
  - name: PyBIDS-reports Documentation
    url: https://pybids-reports.readthedocs.io/
  - name: Pybv Documentation
    url: https://pybv.readthedocs.io/
  - name: bids-matlab Documentation
    url: https://bids-matlab.readthedocs.io/
  # Outdated
  - name: BIDS Apps
    url: https://bids-apps.neuroimaging.io/
  - name: BIDS Execution Specification
    url: https://bids-standard.github.io/execution-spec/

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  # cname: demo.upptime.js.org
  baseUrl: /uptime
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: BIDS Web Dashboard
  introTitle: BIDS Web Dashboard
  introMessage: >
    This status page tracks the uptime of projects that fall under the
    [BIDS](https://bids.neuroimaging.io) umbrella of projects.
    Built using the open [**Upptime**](https://github.com/upptime/upptime) app
    on [GitHub](https://github.com).
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
